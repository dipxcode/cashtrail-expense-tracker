{% extends 'base.html' %}
{% block title %}Delete {{ type }}{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5 col-lg-4">
  <div class="ct-card p-5 text-center">
    <div style="width:72px;height:72px;border-radius:50%;background:rgba(239,68,68,.1);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 18px">🗑️</div>
    <h5 style="font-weight:700;margin-bottom:8px">Delete {{ type }}?</h5>
    <p style="color:var(--ct-muted);font-size:13.5px;margin-bottom:6px">You are about to delete <strong>{{ object }}</strong>.</p>
    <p style="color:#EF4444;font-size:12.5px;margin-bottom:28px">This action cannot be undone.</p>
    <div class="d-flex gap-3 justify-content-center">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-ct btn-ct-danger">Yes, Delete</button>
      </form>
      <a href="javascript:history.back()" class="btn-ct-outline">Cancel</a>
    </div>
  </div>
</div>
</div>
{% endblock %}
